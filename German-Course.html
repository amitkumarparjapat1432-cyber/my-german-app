<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4f7 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.20);
            padding: 25px 30px 40px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #eef3f9;
            padding-bottom: 15px;
            margin-bottom: 20px;
            gap: 12px;
        }
        .header-left h1 {

            font-weight: 700;
            color: #1a2b4a;
        }
        .header-left h1 span {

        }
        .header-left .sub {

        }
        .stats {

            gap: 20px;
            background: #f0f6fe;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            color: #1a3a5c;
            flex-wrap: wrap;
        }
        .stats span {
            color: #0b5ca3;
        }
        .progress-badge {
            background: #0b5ca3;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }

        /* ===== SECTION TABS ===== */
        .section-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 2px solid #eef3f9;
            padding-bottom: 10px;
        }
        .section-tab {
            padding: 8px 22px;
            border: 2px solid #d3e0ee;
            border-radius: 40px;
            background: white;
            font-weight: 700;
            font-size: 14px;
            color: #1f3b5c;
            cursor: pointer;
            transition: 0.2s;
        }
        .section-tab:hover {
            background: #e6effa;
            border-color: #8bb3dd;
        }
        .section-tab.active {
            background: #1a4b7a;
            border-color: #1a4b7a;
            color: white;
        }
        .section-tab .badge {
            background: #e53935;
            color: white;
            padding: 0 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 6px;
        }
        .section-tab.active .badge {
            background: #ff8a80;
        }

        /* ===== CONTROLS ===== */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            background: #f8faff;
            padding: 10px 16px;
            border-radius: 16px;
            border: 1px solid #e5edf6;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #1f3b5c;
            cursor: pointer;
        }
        .toggle-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1a4b7a;
            cursor: pointer;
        }
        .topic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-left: auto;
        }
        .topic-tag {
            background: #eef3fa;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: #1f3b5c;
            border: 1px solid transparent;
        }
        .topic-tag.active {
            background: #1a4b7a;
            color: white;
            border-color: #1a4b7a;
        }

        /* ===== PART NAV ===== */
        .part-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }
        .part-btn {
            padding: 6px 14px;
            border: 2px solid #d3e0ee;
            border-radius: 40px;
            background: white;
            font-weight: 600;
            font-size: 12px;
            color: #1f3b5c;
            cursor: pointer;
            transition: 0.2s;
        }
        .part-btn:hover {
            background: #e6effa;
            border-color: #8bb3dd;
        }
        .part-btn.active {
            background: #1a4b7a;
            border-color: #1a4b7a;
            color: white;
        }
        .part-btn .check {
            color: #2e7d32;
            margin-left: 5px;
        }
        .part-btn.active .check {
            color: #a5d6a7;
        }
        .part-title {
            font-size: 20px;
            font-weight: 700;
            color: #11253e;
            margin: 4px 0 2px;
        }
        .part-desc {
            color: #4d627c;
            font-size: 14px;
            margin-bottom: 14px;
        }

        /* ===== SENTENCE CARDS ===== */
        .sentence-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .sentence-grid::-webkit-scrollbar {
            width: 6px;
        }
        .sentence-grid::-webkit-scrollbar-thumb {
            background: #c1d4e8;
            border-radius: 10px;
        }

        .sentence-card {
            display: grid;
            grid-template-columns: 38px 1fr 1.2fr 50px 50px;
            align-items: center;
            background: #fafcff;
            border: 1.5px solid #e5edf6;
            border-radius: 12px;
            padding: 6px 12px 6px 10px;
            transition: 0.15s;
            gap: 8px;
        }
        .sentence-card.correct {
            background: #edf7ed;
            border-color: #8bc34a;
        }
        .sentence-card.incorrect {
            background: #ffefef;
            border-color: #ef9a9a;
        }
        .sentence-card .num {
            font-weight: 700;
            color: #6c86a3;
            font-size: 13px;
            text-align: center;
        }
        .sentence-card .eng {
            font-weight: 500;
            color: #1e334f;
            font-size: 14px;
        }
        .sentence-card .eng .topic-badge {
            font-size: 10px;
            background: #eef3fa;
            padding: 1px 8px;
            border-radius: 20px;
            margin-left: 6px;
            font-weight: 600;
            color: #4d627c;
        }
        .sentence-card .eng .qa-badge {

            background: #e8f0fe;
            padding: 1px 8px;
            border-radius: 20px;
            margin-left: 6px;
            font-weight: 600;
            color: #1a4b7a;
        }
        .sentence-card .german-input {

            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: 0.2s;
            width: 100%;
            background: white;

            border-color: #1a4b7a;

            border-color: #4caf50;
            background: #f1f9f1;
        }
        .sentence-card .german-input.incorrect {
            border-color: #e53935;
            background: #fff4f4;
        }
        .sentence-card .german-input:disabled {
            opacity: 0.7;
        }
        .sentence-card .german-input.show-mode {
            border-color: #ff9800;
            background: #fff8e1;
        }
        .sentence-card .btn-speak {
            background: #eef3fa;
            border: none;
            border-radius: 40px;
            width: 38px;
            height: 38px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sentence-card .btn-speak:hover {
            background: #d4e2f5;
            transform: scale(1.05);
        }
        .sentence-card .btn-speak:active {
            transform: scale(0.94);
        }
        .sentence-card .status-icon {
            font-size: 20px;
            text-align: center;
        }
        .sentence-card .show-answer {
            font-size: 12px;
            color: #1a4b7a;
            background: #eef3fa;
            padding: 2px 10px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }
        .sentence-card .show-answer:hover {
            background: #d4e2f5;
        }
        .sentence-card .answer-reveal {
            font-size: 13px;
            color: #0b5ca3;
            font-weight: 600;
            background: #eef6ff;
            padding: 2px 10px;
            border-radius: 20px;
            display: none;
        }
        .sentence-card .answer-reveal.show {
            display: inline-block;
        }
        .sentence-card .qa-label {
            font-size: 11px;
            font-weight: 700;
            color: #1a4b7a;
            background: #e8f0fe;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .sentence-card .question-mark {
            color: #e53935;
            font-weight: 700;
            font-size: 16px;
        }

        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2px solid #eef3f9;
            gap: 12px;
        }
        .btn-reset {
            background: #f0f4fa;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: #1f3b5c;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-reset:hover {
            background: #dce6f2;
        }
        .btn-check-all {
            background: #1a4b7a;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-check-all:hover {
            background: #0f3b60;
        }
        .part-complete-msg {
            font-weight: 600;
            color: #2e7d32;
            font-size: 14px;
            text-align: center;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 820px) {
            .app-container {
                padding: 15px;
            }
            .sentence-card {
                grid-template-columns: 30px 1fr;
                grid-template-rows: auto auto auto;
                gap: 5px 6px;
                padding: 10px;
            }
            .sentence-card .num {
                grid-row: 1;
                grid-column: 1;
            }
            .sentence-card .eng {
                grid-row: 1;
                grid-column: 2;
            }
            .sentence-card .german-input {
                grid-row: 2;
                grid-column: 1 / span 2;
            }
            .sentence-card .btn-speak {
                grid-row: 1;
                grid-column: 3;
                justify-self: end;
            }
            .sentence-card .status-icon {
                grid-row: 1;
                grid-column: 4;
            }
            .sentence-card .show-answer {
                grid-row: 3;
                grid-column: 1;
                font-size: 11px;
                padding: 2px 8px;
            }
            .sentence-card .answer-reveal {
                grid-row: 3;
                grid-column: 2;
                font-size: 12px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .stats {
                justify-content: space-around;
                font-size: 12px;
                padding: 6px 12px;
            }
            .controls-row {
                flex-direction: column;
                align-items: stretch;
            }
            .topic-tags {
                margin-left: 0;
                justify-content: center;
            }
            .section-tabs {
                flex-wrap: wrap;
            }
            .section-tab {
                flex: 1;
                min-width: 120px;
                text-align: center;
                font-size: 12px;
                padding: 6px 12px;
            }
        }
        @media (max-width: 480px) {
            .part-btn {
                font-size: 10px;
                padding: 4px 10px;
            }
            .sentence-card .eng {
                font-size: 12px;
            }
            .sentence-card .german-input {
                font-size: 12px;
                padding: 5px 8px;
            }
            .sentence-grid {
                max-height: 450px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">

        <div class="header">

                data.parts.forEach((p, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'part-btn' + (idx === currentPart ? ' active' : '');
                    const partResults = data.results[idx] || [];
                    const checked = partResults.filter(r => r && r.checked).length;
                    const total = partResults.length;
                    const done = checked === total && total > 0;
                    btn.innerHTML = `Part ${p.part} ${done ? '✅' : ''}`;
                    btn.title = `${checked}/${total} done`;
                    btn.dataset.idx = idx;
                    btn.addEventListener('click', () => {
                        currentPart = idx;
                        renderAll();
                    });
                    partNav.appendChild(btn);
                });
            } else {
                // Intro section - only one part
                const btn = document.createElement('button');
                btn.className = 'part-btn active';
                const checked = data.results.filter(r => r && r.checked).length;
                const total = data.results.length;
                const done = checked === total && total > 0;
                btn.innerHTML = `Intro Q&A ${done ? '✅' : ''}`;
                btn.title = `${checked}/${total} done`;
                btn.disabled = true;
                partNav.appendChild(btn);
            }
        }

        function renderSentences() {
            const data = getCurrentData();
            const partIdx = currentSection === 'main' ? currentPart : 0;
            const part = data.parts[partIdx];
            const partResults = getResultsForPart(partIdx);
            grid.innerHTML = '';

            if (!part || !part.sentences) return;

            part.sentences.forEach((s, idx) => {
                const res = partResults[idx] || { correct: false, checked: false };
                const card = document.createElement('div');
                card.className = 'sentence-card';
                if (res.checked) {
                    card.classList.add(res.correct ? 'correct' : 'incorrect');
                }

                // Number
                const num = document.createElement('div');
                num.className = 'num';
                num.textContent = idx + 1;
                card.appendChild(num);

                // English / Question
                const eng = document.createElement('div');
                eng.className = 'eng';
                if (s.isIntro) {
                    eng.innerHTML = `❓ ${s.en} <span class="qa-badge">💬 Question</span>`;
                } else {
                    eng.innerHTML = `${s.en} <span class="topic-badge">${s.topic || ''}</span>`;
                }
                card.appendChild(eng);

                // Input - ALWAYS editable (even in show mode for writing practice)
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'german-input';
                input.placeholder = s.isIntro ? 'Type your answer...' : 'Type German...';
                input.dataset.idx = idx;

                // If checked, show the correct answer and disable
                if (res.checked) {
                    input.value = s.de;
                    input.disabled = true;
                    input.classList.add(res.correct ? 'correct' : 'incorrect');
                } else if (showAnswers) {
                    // SHOW MODE: show the answer BUT keep input editable for writing practice
                    input.value = s.de;
                    input.classList.add('show-mode');
                    input.placeholder = '✏️ Practice writing here...';
                    input.disabled = false;
                    // Allow editing in show mode for practice
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            // Check against the answer
                            const userAnswer = input.value.trim();
                            const isCorrect = userAnswer.toLowerCase() === s.de.toLowerCase();
                            setResultForPart(partIdx, idx, { correct: isCorrect, checked: true });
                            renderAll();
                            if (autoSpeak) speak(s.de);
                        }
                    });
                } else {
                    // Normal mode
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') checkOne(idx);
                    });
                }
                card.appendChild(input);

                // Speaker button
                const speakBtn = document.createElement('button');
                speakBtn.className = 'btn-speak';
                speakBtn.textContent = '🔊';
                speakBtn.title = 'Hear pronunciation';
                speakBtn.addEventListener('click', () => {
                    speak(s.de);
                });
                card.appendChild(speakBtn);

                // Status icon
                const status = document.createElement('div');
                status.className = 'status-icon';
                if (res.checked) {
                    status.textContent = res.correct ? '✅' : '❌';
                } else if (showAnswers) {
                    status.textContent = '✏️';
                } else {
                    status.textContent = '⬜';
                }
                card.appendChild(status);

                // Show answer button (only when not in show mode and not checked)
                if (!showAnswers && !res.checked) {
                    const showBtn = document.createElement('button');
                    showBtn.className = 'show-answer';
                    showBtn.textContent = '👁️ Show';
                    showBtn.addEventListener('click', () => {
                        // Show the answer but keep input editable for practice
                        input.value = s.de;
                        input.classList.add('show-mode');
                        input.disabled = false;
                        input.placeholder = '✏️ Practice writing here...';
                        status.textContent = '✏️';
                        speak(s.de);
                        // Remove the show button
                        showBtn.remove();
                        // Add a hint
                        const hint = document.createElement('span');
                        hint.style.cssText =
                        'font-size:11px;color:#ff9800;font-weight:600;grid-row:3;grid-column:2;';
                        hint.textContent = '✏️ Practice writing below';
                        card.appendChild(hint);
                    });
                    card.appendChild(showBtn);
                }

                grid.appendChild(card);
            });
        }

        function updateStats() {
            const data = getCurrentData();
            let totalCorrect = 0;
            let totalChecked = 0;
            let totalAll = 0;

            // Main
            results.main.forEach(part => {
                part.forEach(r => {
                    totalAll++;
                    if (r && r.checked) {
                        totalChecked++;
                        if (r.correct) totalCorrect++;
                    }
                });
            });

            // Intro
            results.intro.forEach(r => {
                totalAll++;
                if (r && r.checked) {
                    totalChecked++;
                    if (r.correct) totalCorrect++;
                }
            });

            correctSpan.textContent = totalCorrect;
            totalSpan.textContent = totalChecked;
            const pct = totalAll > 0 ? Math.round((totalChecked / totalAll) * 100) : 0;
            progressSpan.textContent = pct + '%';

            // Part complete message
            const partResults = getResultsForPart(currentSection === 'main' ? currentPart : 0);
            const checked = partResults.filter(r => r && r.checked).length;
            const total = partResults.length;
            const allDone = checked === total && total > 0;
            if (allDone) {
                const correctInPart = partResults.filter(r => r && r.correct).length;
                if (correctInPart / total >= 0.8) {
                    completeMsg.textContent = '🎉 Great! 80%+ correct. Move to next part!';
                } else {
                    completeMsg.textContent = '📖 Keep practicing – aim for 80% correct.';
                }
            } else {
                completeMsg.textContent = `✍️ ${checked}/${total} checked`;
            }
        }

        function renderAll() {
            renderPartNav();
            const data = getCurrentData();
            const partIdx = currentSection === 'main' ? currentPart : 0;
            const part = data.parts[partIdx];
            if (part) {
                partTitle.textContent = currentSection === 'main' ? `Part ${part.part} – ${part.label}` :
                    `👤 ${part.label}`;
                partDesc.textContent = part.desc;
            }
            renderSentences();
            updateStats();
        }

        // ============================================================
        //  ACTIONS
        // ============================================================

        function checkOne(idx) {
            const data = getCurrentData();
            const partIdx = currentSection === 'main' ? currentPart : 0;
            const part = data.parts[partIdx];
            const input = document.querySelector(`.german-input[data-idx="${idx}"]`);
            if (!input) return;

            // If already checked, don't re-check
            const existing = getResultsForPart(partIdx)[idx];
            if (existing && existing.checked) return;

            const userAnswer = input.value.trim();
            const correctAnswer = part.sentences[idx].de;
            const isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase();
            setResultForPart(partIdx, idx, { correct: isCorrect, checked: true });
            renderAll();
            if (autoSpeak) {
                speak(correctAnswer);
            }
        }

        function checkAll() {
            const data = getCurrentData();
            const partIdx = currentSection === 'main' ? currentPart : 0;
            const part = data.parts[partIdx];
            const inputs = document.querySelectorAll('.german-input:not(:disabled)');
            let anyChecked = false;

            inputs.forEach((input) => {
                const idx = parseInt(input.dataset.idx);
                const existing = getResultsForPart(partIdx)[idx];
                if (existing && existing.checked) return;

                const userAnswer = input.value.trim();
                const correctAnswer = part.sentences[idx].de;
                const isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase();
                setResultForPart(partIdx, idx, { correct: isCorrect, checked: true });
                anyChecked = true;
            });

            renderAll();
            if (autoSpeak && anyChecked) {
                const firstInput = document.querySelector('.german-input:disabled');
                if (firstInput) {
                    const idx = parseInt(firstInput.dataset.idx);
                    speak(part.sentences[idx].de);
                }
            }
        }

        function resetPart() {
            const partIdx = currentSection === 'main' ? currentPart : 0;
            const total = getResultsForPart(partIdx).length;
            if (currentSection === 'main') {
                results.main[partIdx] = Array.from({ length: total }, () => ({ correct: false, checked: false }));
            } else {
                results.intro = Array.from({ length: total }, () => ({ correct: false, checked: false }));
            }
            renderAll();
        }

        // ============================================================
        //  SPEECH (TTS)
        // ============================================================
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            utterance.rate = 0.8;
            utterance.pitch = 1;
            const voices = window.speechSynthesis.getVoices();
            const deVoice = voices.find(v => v.lang.startsWith('de'));
            if (deVoice) utterance.voice = deVoice;
            window.speechSynthesis.speak(utterance);
        }

        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        // ============================================================
        //  EVENT BINDING
        // ============================================================
        resetBtn.addEventListener('click', resetPart);
        checkAllBtn.addEventListener('click', checkAll);

        showToggle.addEventListener('change', () => {
            showAnswers = showToggle.checked;
            renderAll();
        });

        autoSpeakToggle.addEventListener('change', () => {
            autoSpeak = autoSpeakToggle.checked;
        });

        // Section tabs
        document.querySelectorAll('.section-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSection = tab.dataset.section;
                currentPart = 0;
                renderAll();
            });
        });

        // ============================================================
        //  INIT
        // ============================================================
        renderAll();
        window.checkOne = checkOne;
    </script>

</body>
</html>
